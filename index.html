<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתכנן הטיולים שלך לפריז</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:   #0F0F0F;
            --dark:    #1A1A1A;
            --dark2:   #252525;
            --yellow:  #FFD100;
            --orange:  #FF6B00;
            --white:   #FFFFFF;
            --gray:    #999;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--black);
            min-height: 100vh;
            color: var(--white);
            padding-bottom: 40px;
        }

        /* ── Header ── */
        .header {
            background: var(--black);
            padding: 32px 24px 24px;
            text-align: center;
            border-bottom: 3px solid var(--yellow);
        }

        .header-flag { font-size: 2.8rem; line-height: 1; margin-bottom: 6px; }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--yellow);
            letter-spacing: -0.5px;
        }

        .header p { color: var(--gray); font-size: 0.95rem; margin-top: 6px; }

        /* Progress */
        .progress-wrap {
            max-width: 620px;
            margin: 0 auto;
            padding: 14px 24px 0;
        }

        .progress-track {
            background: var(--dark2);
            border-radius: 20px;
            height: 7px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            border-radius: 20px;
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-label {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 6px;
            text-align: center;
        }

        /* ── Container ── */
        .container {
            max-width: 620px;
            margin: 0 auto;
            padding: 24px 18px;
        }

        /* ── Form fields ── */
        .user-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .field.full { grid-column: 1 / -1; }

        .field label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input,
        .field select {
            padding: 11px 14px;
            background: var(--dark2);
            border: 1.5px solid #333;
            border-radius: 8px;
            color: var(--white);
            font-family: 'Assistant', sans-serif;
            font-size: 0.97rem;
            transition: border-color 0.2s;
        }

        .field input::placeholder { color: #555; }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: var(--orange);
        }

        .field select option { background: var(--dark2); }

        /* ── Category block ── */
        .category { margin-bottom: 28px; }

        .cat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cat-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--yellow);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .cat-title span { font-size: 1.3rem; }

        .select-all-btn {
            font-size: 0.75rem;
            color: var(--orange);
            background: transparent;
            border: 1px solid var(--orange);
            border-radius: 20px;
            padding: 3px 12px;
            cursor: pointer;
            font-family: 'Assistant', sans-serif;
            font-weight: 700;
            transition: all 0.2s;
        }

        .select-all-btn:hover { background: var(--orange); color: var(--white); }

        /* ── Cards grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .place-card {
            background: var(--dark2);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
            user-select: none;
            position: relative;
        }

        .place-card:hover { border-color: #444; transform: translateY(-2px); }

        .place-card.selected {
            border-color: var(--orange);
            box-shadow: 0 0 0 1px var(--orange), 0 4px 16px rgba(255,107,0,0.25);
        }

        /* Image area */
        .card-img-wrap {
            position: relative;
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, #2a2a2a, #333);
            overflow: hidden;
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.35s;
        }

        .place-card:hover .card-img-wrap img { transform: scale(1.05); }

        /* Gradient overlay always */
        .card-img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%);
        }

        /* Selected overlay */
        .card-check {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            background: var(--orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: white;
            font-weight: 800;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2;
        }

        .place-card.selected .card-check {
            opacity: 1;
            transform: scale(1);
        }

        /* img fallback */
        .card-img-wrap.no-img {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        /* Name bar */
        .card-name {
            padding: 10px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white);
            line-height: 1.3;
        }

        .place-card.selected .card-name { color: var(--yellow); }

        /* hidden checkbox */
        .place-card input[type="checkbox"] { display: none; }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid #2a2a2a;
            margin: 28px 0 22px;
        }

        /* ── Textarea ── */
        .special-req label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
        }

        .special-req textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--dark2);
            border: 1.5px solid #333;
            border-radius: 8px;
            color: var(--white);
            font-family: 'Assistant', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        .special-req textarea::placeholder { color: #555; }
        .special-req textarea:focus { outline: none; border-color: var(--orange); }

        /* ── Summary badge ── */
        .summary-badge {
            margin: 20px 0 16px;
            padding: 13px 18px;
            background: var(--dark2);
            border: 1.5px solid var(--yellow);
            border-radius: 10px;
            color: var(--yellow);
            font-weight: 700;
            font-size: 0.92rem;
            text-align: center;
            transition: all 0.3s;
        }

        /* ── Send button ── */
        .send-btn {
            width: 100%;
            padding: 17px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Assistant', sans-serif;
            font-size: 1.12rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37,211,102,0.3);
            transition: all 0.25s;
            letter-spacing: 0.3px;
        }

        .send-btn:hover { background: #128C7E; transform: translateY(-2px); }
        .send-btn:active { transform: translateY(0); }

        @media (max-width: 420px) {
            .user-grid { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
            .card-img-wrap { height: 110px; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-flag">🗼</div>
    <h1>בונים את פריז שלך</h1>
    <p>בחרו את המקומות שמדליקים אתכם — ואבנה מסלול על הדרך</p>
</div>

<div class="progress-wrap">
    <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">טרם נבחרו מקומות</div>
</div>

<div class="container">

    <div class="user-grid">
        <div class="field full">
            <label>שם מלא *</label>
            <input type="text" id="userName" placeholder="למשל: יוסי ורחל כהן">
        </div>
        <div class="field">
            <label>תאריך הגעה</label>
            <input type="date" id="arrivalDate">
        </div>
        <div class="field">
            <label>תאריך עזיבה</label>
            <input type="date" id="departureDate">
        </div>
        <div class="field">
            <label>מספר מטיילים</label>
            <select id="groupSize">
                <option value="">בחרו...</option>
                <option>1 — יחיד/ה</option>
                <option>2 — זוג</option>
                <option>3-4 — קבוצה קטנה</option>
                <option>5+ — קבוצה גדולה</option>
            </select>
        </div>
        <div class="field">
            <label>תקציב</label>
            <select id="budget">
                <option value="">בחרו...</option>
                <option>חסכוני 🪙</option>
                <option>בינוני 💶</option>
                <option>נוח ✨</option>
                <option>יוקרה 💎</option>
            </select>
        </div>
    </div>

    <div id="categoriesContainer"></div>

    <hr class="divider">

    <div class="special-req">
        <label>💬 בקשות מיוחדות / הערות</label>
        <textarea id="specialReq" placeholder="ילדים קטנים, כשרות, בעיית ניידות, תחומי עניין מיוחדים..."></textarea>
    </div>

    <div class="summary-badge" id="summaryBadge">
        בחרו מקומות ואבנה לכם מסלול מותאם אישית 🗺️
    </div>

    <button class="send-btn" onclick="sendToWhatsApp()">
        📲 שלח לבניית המסלול בוואטסאפ
    </button>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// הגדרות — ערוך כאן בלבד
// להוספת קטגוריה: העתק בלוק { id, icon, title, places } והוסף לרשימה.
// להוספת מקום: הוסף { name, img } לתוך places של הקטגוריה הרצויה.
// ─────────────────────────────────────────────────────────────────────────────

const MY_PHONE = "972523030015";

const CATEGORIES = [
    {
        id: "must",
        icon: "📍",
        title: "אתרי חובה",
        places: [
            { name: "מגדל אייפל",       img: "https://loremflickr.com/400/220/eiffel,tower,paris" },
            { name: "מוזיאון הלובר",     img: "https://loremflickr.com/400/220/louvre,paris,museum" },
            { name: "שער הניצחון",       img: "https://loremflickr.com/400/220/arc,triumph,paris" },
            { name: "קתדרלת נוטרדאם",   img: "https://loremflickr.com/400/220/notre,dame,paris,cathedral" },
            { name: "שאנז אליזה",        img: "https://loremflickr.com/400/220/champs,elysees,paris" },
        ]
    },
    {
        id: "art",
        icon: "🎨",
        title: "אמנות ותרבות",
        places: [
            { name: "מוזיאון ד'אורסיי",      img: "https://loremflickr.com/400/220/orsay,museum,paris" },
            { name: "מרכז פומפידו",           img: "https://loremflickr.com/400/220/pompidou,paris,art" },
            { name: "מוזיאון פיקאסו",         img: "https://loremflickr.com/400/220/picasso,art,museum" },
            { name: "המוזיאון היהודי (MAHJ)", img: "https://loremflickr.com/400/220/jewish,museum,paris" },
            { name: "ארמון ורסאי (יום שלם)",  img: "https://loremflickr.com/400/220/versailles,palace,garden" },
        ]
    },
    {
        id: "hood",
        icon: "🏘️",
        title: "שכונות לסיור",
        places: [
            { name: "מונמארטר",          img: "https://loremflickr.com/400/220/montmartre,paris,sacre,coeur" },
            { name: "לה מארה",           img: "https://loremflickr.com/400/220/marais,paris,street" },
            { name: "הרובע הלטיני",      img: "https://loremflickr.com/400/220/latin,quarter,paris" },
            { name: "תעלת סן מרטן",      img: "https://loremflickr.com/400/220/canal,saint,martin,paris" },
            { name: "סן ז'רמן דה פרה",   img: "https://loremflickr.com/400/220/saint,germain,paris,cafe" },
        ]
    },
    {
        id: "park",
        icon: "🌳",
        title: "פארקים ומנוחה",
        places: [
            { name: "גני לוקסמבורג",                  img: "https://loremflickr.com/400/220/luxembourg,garden,paris" },
            { name: "גני טווילרי",                    img: "https://loremflickr.com/400/220/tuileries,garden,paris" },
            { name: "פארק בוט שומון",                 img: "https://loremflickr.com/400/220/buttes,chaumont,paris,park" },
            { name: "פרומנד פלאנטה (הגשר הירוק)",    img: "https://loremflickr.com/400/220/paris,viaduct,promenade,green" },
        ]
    },
    {
        id: "food",
        icon: "🍽️",
        title: "אוכל וקניות",
        places: [
            { name: "שוק אוכל צרפתי אותנטי",  img: "https://loremflickr.com/400/220/paris,market,french,food" },
            { name: "מסעדות כשרות במארה",      img: "https://loremflickr.com/400/220/kosher,paris,food,restaurant" },
            { name: "גלריה לאפייט",            img: "https://loremflickr.com/400/220/galeries,lafayette,paris,shopping" },
            { name: "שוק פשפשים Saint-Ouen",   img: "https://loremflickr.com/400/220/flea,market,paris,antique" },
        ]
    },
];

// ─────────────────────────────────────────────────────────────────────────────
// UI — אין צורך לגעת מכאן
// ─────────────────────────────────────────────────────────────────────────────

function buildCategories() {
    const container = document.getElementById('categoriesContainer');
    CATEGORIES.forEach(cat => {
        const section = document.createElement('div');
        section.className = 'category';

        const cardsHtml = cat.places.map((place, i) => `
            <div class="place-card" data-cat="${cat.id}" data-name="${place.name.replace(/"/g,'&quot;')}" onclick="toggleCard(this)">
                <input type="checkbox" class="place ${cat.id}">
                <div class="card-check">✓</div>
                <div class="card-img-wrap" id="img-${cat.id}-${i}">
                    <img src="${place.img}" alt="${place.name}" loading="lazy"
                         onerror="this.closest('.card-img-wrap').classList.add('no-img'); this.style.display='none';">
                </div>
                <div class="card-name">${place.name}</div>
            </div>
        `).join('');

        section.innerHTML = `
            <div class="cat-header">
                <div class="cat-title"><span>${cat.icon}</span>${cat.title}</div>
                <button class="select-all-btn" onclick="toggleAll(this,'${cat.id}')">בחר הכל</button>
            </div>
            <div class="cards-grid">${cardsHtml}</div>
        `;
        container.appendChild(section);
    });
}

function toggleCard(card) {
    const cb = card.querySelector('input[type="checkbox"]');
    cb.checked = !cb.checked;
    card.classList.toggle('selected', cb.checked);
    updateProgress();
}

function toggleAll(btn, catId) {
    const cards    = document.querySelectorAll(`.place-card[data-cat="${catId}"]`);
    const allOn    = [...cards].every(c => c.classList.contains('selected'));
    cards.forEach(card => {
        const cb = card.querySelector('input');
        cb.checked = !allOn;
        card.classList.toggle('selected', !allOn);
    });
    btn.textContent = allOn ? 'בחר הכל' : 'בטל הכל';
    updateProgress();
}

function updateProgress() {
    const total    = document.querySelectorAll('.place-card').length;
    const selected = document.querySelectorAll('.place-card.selected').length;
    const pct      = total ? Math.round((selected / total) * 100) : 0;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent =
        selected === 0 ? 'טרם נבחרו מקומות'
        : selected === 1 ? 'מקום אחד נבחר'
        : `${selected} מקומות נבחרו`;

    document.getElementById('summaryBadge').textContent =
        selected === 0
        ? 'בחרו מקומות ואבנה לכם מסלול מותאם אישית 🗺️'
        : `✅ נבחרו ${selected} מקומות — לחצו שלח ונבנה יחד את המסלול!`;
}

function sendToWhatsApp() {
    const name      = document.getElementById('userName').value.trim();
    const arrival   = document.getElementById('arrivalDate').value;
    const departure = document.getElementById('departureDate').value;
    const group     = document.getElementById('groupSize').value;
    const budget    = document.getElementById('budget').value;
    const special   = document.getElementById('specialReq').value.trim();
    const selected  = document.querySelectorAll('.place-card.selected');

    if (!name)           { alert('בבקשה רשמו את שמכם'); return; }
    if (!selected.length){ alert('בבקשה בחרו לפחות מקום אחד'); return; }

    let msg = `היי! אני ${name} ואני מעוניין/ת בבניית מסלול לפריז 🇫🇷\n\n`;

    if (arrival)   msg += `📅 הגעה: ${fmtDate(arrival)}\n`;
    if (departure) msg += `📅 עזיבה: ${fmtDate(departure)}\n`;
    if (group)     msg += `👥 מטיילים: ${group}\n`;
    if (budget)    msg += `💶 תקציב: ${budget}\n`;

    msg += `\n📍 המקומות שבחרתי:\n`;
    selected.forEach((card, i) => { msg += `${i + 1}. ${card.dataset.name}\n`; });

    if (special) msg += `\n💬 הערות: ${special}`;
    msg += `\n\nמחכה למסלול שלכם! תודה 🙏`;

    window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
}

function fmtDate(s) {
    const [y, m, d] = s.split('-');
    return `${d}/${m}/${y}`;
}

buildCategories();
</script>

</body>
</html>
