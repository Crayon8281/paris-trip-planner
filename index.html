<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <style>
        :root {
            --black:  #0F0F0F;
            --dark:   #1A1A1A;
            --dark2:  #252525;
            --yellow: #FFD100;
            --orange: #FF6B00;
            --white:  #FFFFFF;
            --gray:   #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--black);
            min-height: 100vh;
            color: var(--white);
            padding-bottom: 50px;
        }

        /* ── Header ── */
        .header {
            background: var(--black);
            padding: 28px 24px 18px;
            text-align: center;
            border-bottom: 3px solid var(--yellow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header h1 { font-size: 1.7rem; font-weight: 800; color: var(--yellow); }
        .header-flag { font-size: 2rem; }
        .header p { color: var(--gray); font-size: 0.88rem; margin-top: 5px; }

        /* Progress */
        .progress-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 12px 20px 0;
        }
        .progress-track { background: var(--dark2); border-radius: 20px; height: 6px; overflow: hidden; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            border-radius: 20px;
            width: 0%;
            transition: width 0.4s ease;
        }
        .progress-label { font-size: 0.78rem; color: var(--gray); margin-top: 5px; text-align: center; }

        /* ── Container ── */
        .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

        /* ── Form fields ── */
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field.full { grid-column: 1 / -1; }
        .field label { font-size: 0.78rem; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 0.5px; }
        .field input, .field select {
            padding: 10px 12px;
            background: var(--dark2);
            border: 1.5px solid #333;
            border-radius: 8px;
            color: var(--white);
            font-family: 'Assistant', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .field input::placeholder { color: #555; }
        .field input:focus, .field select:focus { outline: none; border-color: var(--orange); }
        .field select option { background: var(--dark2); }

        /* ── Category ── */
        .category { margin-bottom: 26px; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cat-title { font-size: 1rem; font-weight: 800; color: var(--yellow); display: flex; align-items: center; gap: 7px; }
        .cat-icon { font-size: 1.25rem; }
        .select-all-btn {
            font-size: 0.72rem; color: var(--orange); background: transparent;
            border: 1px solid var(--orange); border-radius: 20px; padding: 3px 10px;
            cursor: pointer; font-family: 'Assistant', sans-serif; font-weight: 700; transition: all 0.2s;
        }
        .select-all-btn:hover { background: var(--orange); color: var(--white); }

        /* ── Card grid ── */
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .place-card {
            background: var(--dark2);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
            user-select: none;
            position: relative;
        }
        .place-card:hover { border-color: #444; transform: translateY(-2px); }
        .place-card.selected {
            border-color: var(--orange);
            box-shadow: 0 0 0 1px var(--orange), 0 3px 12px rgba(255,107,0,0.2);
        }

        .card-img-wrap {
            position: relative;
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, #2a2a2a, #333);
            overflow: hidden;
        }
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.35s;
        }
        .place-card:hover .card-img-wrap img { transform: scale(1.06); }
        .card-img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 55%);
        }
        .card-img-wrap.no-img {
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--dark2), #333);
        }

        .card-check {
            position: absolute;
            top: 6px; left: 6px;
            width: 24px; height: 24px;
            background: var(--orange);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; color: white; font-weight: 800;
            opacity: 0; transform: scale(0.5);
            transition: opacity 0.2s, transform 0.2s;
            z-index: 2;
        }
        .place-card.selected .card-check { opacity: 1; transform: scale(1); }

        .card-name {
            padding: 7px 8px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--white);
            line-height: 1.3;
        }
        .place-card.selected .card-name { color: var(--yellow); }
        .place-card input[type="checkbox"] { display: none; }

        /* ── Divider ── */
        .divider { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0 20px; }

        /* ── Textarea ── */
        .special-req label {
            font-size: 0.78rem; font-weight: 700; color: var(--yellow);
            text-transform: uppercase; letter-spacing: 0.5px;
            display: block; margin-bottom: 7px;
        }
        .special-req textarea {
            width: 100%; padding: 11px 13px;
            background: var(--dark2); border: 1.5px solid #333;
            border-radius: 8px; color: var(--white);
            font-family: 'Assistant', sans-serif; font-size: 0.94rem;
            resize: vertical; min-height: 75px; transition: border-color 0.2s;
        }
        .special-req textarea::placeholder { color: #555; }
        .special-req textarea:focus { outline: none; border-color: var(--orange); }

        /* ── Summary ── */
        .summary-badge {
            margin: 18px 0 14px;
            padding: 12px 16px;
            background: var(--dark2);
            border: 1.5px solid var(--yellow);
            border-radius: 10px;
            color: var(--yellow);
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.3s;
        }

        /* ── Send button ── */
        .send-btn {
            width: 100%; padding: 16px;
            background: #25D366; color: white; border: none;
            border-radius: 12px;
            font-family: 'Assistant', sans-serif;
            font-size: 1.08rem; font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37,211,102,0.28);
            transition: all 0.25s;
        }
        .send-btn:hover { background: #128C7E; transform: translateY(-2px); }
        .send-btn:active { transform: translateY(0); }

        /* ── Footer ── */
        .page-footer {
            text-align: center;
            color: #444;
            font-size: 0.72rem;
            margin-top: 30px;
            padding: 0 16px;
            line-height: 1.6;
        }
        .page-footer strong { color: #666; }

        @media (max-width: 500px) {
            .user-grid { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 1.35rem; }
        }
    </style>
</head>

        <div class="field">

    </div>

    <div class="special-req">

    </div>

    <div class="summary-badge" id="summaryBadge">
        סמנו מקומות ואבנה לכם מסלול מותאם אישית 🗺️
    </div>

    <div class="page-footer">

function buildCategories() {
    const container = document.getElementById('categoriesContainer');
    CATEGORIES.forEach(cat => {
        const section = document.createElement('div');
        section.className = 'category';

        const cardsHtml = cat.places.map((place, i) => `
            <div class="place-card" data-cat="${cat.id}" data-name="${place.name.replace(/"/g,'&quot;')}" onclick="toggleCard(this)">
                <input type="checkbox" class="place ${cat.id}">
                <div class="card-check">✓</div>
                <div class="card-img-wrap" id="wrap-${cat.id}-${i}">
                    <img src="${place.img}" alt="${place.name}" loading="lazy"
                         onerror="this.closest('.card-img-wrap').classList.add('no-img'); this.remove();">
                </div>
                <div class="card-name">${place.name}</div>
            </div>
        `).join('');

        section.innerHTML = `
            <div class="cat-header">
                <div class="cat-title">
                    <span class="cat-icon">${cat.icon}</span>${cat.title}
                </div>
                <button class="select-all-btn" onclick="toggleAll(this,'${cat.id}')">בחר הכל</button>
            </div>
            <div class="cards-grid">${cardsHtml}</div>
        `;
        container.appendChild(section);
    });
}

function toggleCard(card) {
    const cb = card.querySelector('input[type="checkbox"]');
    cb.checked = !cb.checked;
    card.classList.toggle('selected', cb.checked);
    updateProgress();
}

function toggleAll(btn, catId) {
    const cards  = document.querySelectorAll(`.place-card[data-cat="${catId}"]`);
    const allOn  = [...cards].every(c => c.classList.contains('selected'));
    cards.forEach(card => {
        card.querySelector('input').checked = !allOn;
        card.classList.toggle('selected', !allOn);
    });
    btn.textContent = allOn ? 'בחר הכל' : 'בטל הכל';
    updateProgress();
}

function updateProgress() {
    const total    = document.querySelectorAll('.place-card').length;
    const selected = document.querySelectorAll('.place-card.selected').length;
    const pct      = total ? Math.round((selected / total) * 100) : 0;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent =
        selected === 0 ? 'טרם נבחרו מקומות'
        : selected === 1 ? 'מקום אחד נבחר'
        : `${selected} מקומות נבחרו`;

    document.getElementById('summaryBadge').textContent =
        selected === 0
        ? 'סמנו מקומות ואבנה לכם מסלול מותאם אישית 🗺️'
        : `✅ נבחרו ${selected} מקומות — לחצו שלח ונבנה יחד את המסלול!`;
}

function sendToWhatsApp() {
    const name      = document.getElementById('userName').value.trim();
    const arrival   = document.getElementById('arrivalDate').value;
    const departure = document.getElementById('departureDate').value;
    const group     = document.getElementById('groupSize').value;
    const budget    = document.getElementById('budget').value;
    const special   = document.getElementById('specialReq').value.trim();
    const selected  = document.querySelectorAll('.place-card.selected');

    if (!name)           { alert('בבקשה רשמו את שמכם'); return; }
    if (!selected.length){ alert('בבקשה בחרו לפחות מקום אחד'); return; }

    let msg = `היי! אני ${name} ואני מעוניין/ת בבניית מסלול לפריז 🇫🇷\n\n`;
    if (arrival)   msg += `📅 הגעה: ${fmtDate(arrival)}\n`;
    if (departure) msg += `📅 עזיבה: ${fmtDate(departure)}\n`;
    if (group)     msg += `👥 מטיילים: ${group}\n`;
    if (budget)    msg += `💶 תקציב: ${budget}\n`;
    msg += `\n📍 המקומות שבחרתי:\n`;
    selected.forEach((card, i) => { msg += `${i + 1}. ${card.dataset.name}\n`; });
    if (special) msg += `\n💬 הערות: ${special}`;
    msg += `\n\nמחכה למסלול שלכם! תודה 🙏`;

    window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
}

function fmtDate(s) {
    const [y, m, d] = s.split('-');
    return `${d}/${m}/${y}`;
}

buildCategories();
